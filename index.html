<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Airbnb Mombasa — Coastal Living, Redefined</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
  :root{
    --ocean:#1A9ACC;--ocean-mid:#2AAFBE;--teal:#2AAFBE;--teal-light:rgba(42,175,190,0.15);
    --sand:#111111;--coral:#E8614A;--white:#0A0A0A;--charcoal:#EAEAEA;
    --muted:#8A9FAA;--border:#242424;--card:#141414;
    --green:#00A650;--green-light:rgba(0,166,80,0.12);
    --red:#E05A5A;--red-light:rgba(224,90,90,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Outfit',sans-serif;background:#0A0A0A;color:var(--charcoal);}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:16px 5%;background:rgba(10,10,10,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--ocean),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
  .logo-text{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#EAEAEA;}
  .logo-text span{color:var(--coral);}

  .nav-links{display:flex;gap:24px;align-items:center;}
  .nav-links a{text-decoration:none;color:#8A9FAA;font-size:0.88rem;font-weight:500;}
  .nav-cta{background:var(--coral);color:#fff!important;padding:8px 20px;border-radius:50px;}

  .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:100px 5% 60px;gap:50px;background-image:url('room1.jpeg');background-size:cover;background-position:center;position:relative;}
  .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(100deg,rgba(5,25,40,0.82),rgba(5,25,40,0.3));}
  .hero>*{position:relative;z-index:1;}

  .btn-p{background:var(--coral);color:#fff;padding:13px 28px;border-radius:50px;text-decoration:none;}
  .btn-o{border:2px solid #fff;color:#fff;padding:13px 28px;border-radius:50px;text-decoration:none;}

  section{padding:80px 5%;}

  .book-wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:36px;}

  .bform{background:var(--card);padding:34px;border-radius:24px;border:1px solid var(--border);}

  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  .fg{display:flex;flex-direction:column;gap:6px;}

  .fg.full{grid-column:1/3;}

  .fg label{font-size:0.7rem;color:var(--muted);}

  .fg input,.fg select{
    border:1px solid var(--border);
    padding:12px;
    border-radius:10px;
    background:#1A1A1A;
    color:var(--charcoal);
  }

  .fsub{
    width:100%;
    margin-top:14px;
    background:var(--green);
    border:none;
    padding:15px;
    border-radius:50px;
    color:#fff;
    font-weight:600;
    cursor:pointer;
  }
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <div class="logo-icon">🌊</div>
    <div class="logo-text">Airbnb <span>Mombasa</span></div>
  </div>
</nav>

<!-- HERO (unchanged) -->
<section class="hero">
  <div>
    <h1>Your Coastal Escape</h1>
    <a href="#book" class="btn-p">Book</a>
    <a href="#rooms" class="btn-o">Rooms</a>
  </div>
</section>

<!-- BOOKING -->
<section id="book" class="book-bg">
  <div class="book-wrap">

    <div class="bform">
      <div class="fg2">

        <div class="fg">
          <label>Full Name</label>
          <input id="fn" type="text" placeholder="e.g. Amina Salim"/>
        </div>

        <div class="fg">
          <label>M-Pesa Phone Number</label>
          <input id="fp" type="tel" placeholder="07XX XXX XXX"/>
        </div>

        <!-- ✅ FIXED EMAIL FIELD -->
        <div class="fg">
          <label>Email Address</label>
          <input id="fe" type="email" placeholder="e.g. you@example.com"/>
        </div>

        <!-- ✅ FIXED ID FIELD -->
        <div class="fg">
          <label>National ID / Passport</label>
          <input id="fi" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="National ID or Passport"/>
        </div>

        <div class="fg full">
          <label>Room Type</label>
          <select id="fr">
            <option value="">Select Room</option>
            <option value="Studio Apartment|2500">Studio - 2500</option>
            <option value="1 Bedroom Apartment|3500">1 Bedroom - 3500</option>
            <option value="2 Bedroom Suite|5500">2 Bedroom - 5500</option>
          </select>
        </div>

      </div>

      <button class="fsub" id="bookBtn" onclick="doBooking()">
        💚 Pay with M-Pesa
      </button>
    </div>

  </div>
</section>

<!-- YOUR ORIGINAL JS IS LEFT UNCHANGED -->
<script>
const BACKEND = 'https://mpesa-backend-rakq.onrender.com';

async function doBooking(){
  const name = document.getElementById('fn').value;
  const phone = document.getElementById('fp').value;
  const email = document.getElementById('fe').value;
  const idNo = document.getElementById('fi').value;
  const room = document.getElementById('fr').value;

  if(!name || !phone || !email || !idNo || !room){
    alert("Fill all fields");
    return;
  }

  alert("Sending M-Pesa prompt...");

  const [rn, rate] = room.split('|');
  const total = parseInt(rate);

  const res = await fetch(`${BACKEND}/stkpush`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ phone, amount: total, reference:"TEST" })
  });

  const data = await res.json();
  console.log(data);
}
</script>

</body>
</html>
