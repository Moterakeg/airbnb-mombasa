# Fixed HTML Section

Replace the broken form section in your `index.html` with this corrected version:

```html
<div class="fg2">
  <div class="fg">
    <label>Full Name</label>
    <input id="fn" type="text" placeholder="e.g. Amina Salim"/>
  </div>

  <div class="fg">
    <label>M-Pesa Phone Number</label>
    <input id="fp" type="tel" placeholder="07XX XXX XXX"/>
  </div>

  <div class="fg">
    <label>Email Address</label>
    <input id="fe" type="email" placeholder="e.g. you@example.com"/>
  </div>

  <div class="fg">
    <label>National ID / Passport</label>
    <input id="fi" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="National ID or Passport"/>
  </div>

  <div class="fg full">
    <label>Room Type</label>
    <select id="fr" onchange="upd()">
      <option value="">— Select a Room —</option>
      <option value="Studio Apartment|2500">Studio Apartment — KSh 2,500/night</option>
      <option value="1 Bedroom Apartment|3500">1 Bedroom Apartment — KSh 3,500/night</option>
      <option value="2 Bedroom Suite|5500">2 Bedroom Suite — KSh 5,500/night</option>
    </select>
  </div>

  <div class="fg">
    <label>Check-in Date</label>
    <input id="fci" type="date" onchange="upd()"/>
  </div>

  <div class="fg">
    <label>Check-out Date</label>
    <input id="fco" type="date" onchange="upd()"/>
  </div>

  <div class="fg">
    <label>Number of Guests</label>
    <select id="fguests">
      <option>1 Guest</option>
      <option>2 Guests</option>
      <option>3 Guests</option>
      <option>4 Guests</option>
      <option>5+ Guests</option>
    </select>
  </div>
</div>
```

After replacing it:

1. Save the file
2. Push to GitHub
3. In Render → Manual Deploy → Clear build cache & deploy

Your Pay button validation and JavaScript should start working agai
